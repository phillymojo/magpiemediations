version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - printf "DATABASE_URL=%s\nDIRECT_URL=%s\nCLERK_SECRET_KEY=%s\nCLERK_WEBHOOK_SECRET=%s\nNEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=%s\nNEXT_PUBLIC_CLERK_SIGN_IN_URL=%s\nNEXT_PUBLIC_CLERK_SIGN_UP_URL=%s\nNEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=%s\nNEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=%s\n" "$DATABASE_URL" "$DIRECT_URL" "$CLERK_SECRET_KEY" "$CLERK_WEBHOOK_SECRET" "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" "$NEXT_PUBLIC_CLERK_SIGN_IN_URL" "$NEXT_PUBLIC_CLERK_SIGN_UP_URL" "$NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL" "$NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL" > .env
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
